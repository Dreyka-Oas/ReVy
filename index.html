<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./src/styles/variables.css" />
  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/loader-panel.css" />
  <link rel="stylesheet" href="./src/styles/settings-panel.css" />
  <link rel="stylesheet" href="./src/styles/settings-ui.css" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeRy</title>
</head>
<body>
  <div id="startup-loader">
    <div class="loader-percent">0%</div>
    <div class="loader-bar-container">
      <div class="loader-bar-fill"></div>
    </div>
  </div>
  <main class="main">
    <div id="versions-panel" class="versions-panel hidden">
      <div id="versions-header" class="versions-header"></div>
      <div id="versions-list" class="versions-list"></div>
    </div>

    <div class="main-content">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
      </div>
      <h1>VeRy</h1>

      <button id="picker-btn">Choisir un dossier</button>

      <div id="path-display" class="path-display hidden"></div>
      <div id="output"></div>

      <div id="loader-section" class="loader-section hidden">
        <div id="loader-list" class="loader-list"></div>
      </div>

      <div id="action-buttons" class="action-buttons hidden">
        <button id="test-btn" class="action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Test
        </button>
        <button id="github-btn" class="action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          GitHub
        </button>
        <button id="java-btn" class="action-btn">
          <img src="/java.png" width="18" height="18" />
          Java
        </button>
      </div>

    </div>

    <section id="settings-panel" class="settings-panel hidden" aria-label="Directories">
      <div id="settings-header" class="settings-header"></div>
      <div id="settings-subheader" class="settings-subheader"></div>
      <div id="settings-content" class="settings-content">
        <div id="settings-list" class="settings-list"></div>
      </div>
    </section>
    </div>
  </main>

  <div id="settings-backdrop" class="settings-backdrop hidden" aria-hidden="true"></div>

  <div class="top-actions">
    <button id="settings-toggle" class="theme-btn" aria-label="Directories">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        <line x1="12" y1="11" x2="12" y2="17"></line>
        <line x1="9" y1="14" x2="15" y2="14"></line>
      </svg>
    </button>
  </div>

  <footer class="footer">
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
